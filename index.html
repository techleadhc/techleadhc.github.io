<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechLead | Innovation at Lightspeed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@300;400;600&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6e48aa;
            --secondary: #9d50bb;
            --accent: #4776e6;
            --dark: #0f0f1a;
            --light: #f8f9fa;
            --neon: #0ff0fc;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            background: var(--dark);
            color: var(--light);
            perspective: 1000px;
        }
        
        /* Particle background */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        /* Glowing gradient animation */
        .bg-gradient {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, 
                      rgba(110, 72, 170, 0.2) 0%, 
                      rgba(157, 80, 187, 0.1) 30%, 
                      rgba(71, 118, 230, 0.05) 60%, 
                      transparent 80%);
            animation: rotateGradient 30s linear infinite;
            z-index: -2;
        }
        
        @keyframes rotateGradient {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .container {
            text-align: center;
            padding: 3rem 4rem;
            background: rgba(15, 15, 26, 0.7);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(110, 72, 170, 0.3),
                        0 0 60px rgba(157, 80, 187, 0.2),
                        0 0 90px rgba(71, 118, 230, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite, fadeIn 1.5s ease-out;
            max-width: 800px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .container:hover {
            transform: translateY(-10px) rotateX(5deg) rotateY(5deg);
            box-shadow: 0 0 50px rgba(110, 72, 170, 0.5),
                        0 0 80px rgba(157, 80, 187, 0.3),
                        0 0 120px rgba(71, 118, 230, 0.2);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(0) rotateY(0); }
            50% { transform: translateY(-20px) rotateX(2deg) rotateY(2deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(50px) rotateX(20deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(110, 72, 170, 0.3);
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
            animation: textGlow 3s ease-in-out infinite alternate;
        }
        
        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--neon), transparent);
            animation: neonLine 2s ease-in-out infinite;
        }
        
        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(110, 72, 170, 0.3), 
                            0 0 20px rgba(157, 80, 187, 0.2); }
            100% { text-shadow: 0 0 20px rgba(110, 72, 170, 0.5), 
                             0 0 40px rgba(157, 80, 187, 0.3),
                             0 0 60px rgba(71, 118, 230, 0.2); }
        }
        
        @keyframes neonLine {
            0%, 100% { opacity: 0.5; transform: scaleX(0.8); }
            50% { opacity: 1; transform: scaleX(1); }
        }
        
        p {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            position: relative;
            animation: fadeInUp 2s ease-out;
        }
        
        .tagline {
            display: inline-block;
            position: relative;
        }
        
        .tagline::before, .tagline::after {
            content: '✦';
            position: absolute;
            color: var(--neon);
            font-size: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.7;
            animation: pulse 2s infinite;
        }
        
        .tagline::before {
            left: -30px;
        }
        
        .tagline::after {
            right: -30px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translateY(-50%) scale(0.9); }
            50% { opacity: 1; transform: translateY(-50%) scale(1.1); }
        }
        
        .tech-icons {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 3rem;
            flex-wrap: wrap;
        }
        
        .tech-icon {
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            animation: iconFloat 4s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        
        .tech-icon:hover {
            color: var(--neon);
            transform: translateY(-5px) scale(1.2);
            text-shadow: 0 0 20px var(--neon);
        }
        
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(15, 242, 252, 0.5);
            pointer-events: none;
            mix-blend-mode: screen;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease;
        }
        
        .cursor-follower {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(15, 242, 252, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: transform 0.3s ease, width 0.3s ease, height 0.3s ease;
        }
        
        .container:hover ~ .cursor {
            transform: translate(-50%, -50%) scale(1.5);
            background: rgba(15, 242, 252, 0.8);
        }
        
        .container:hover ~ .cursor-follower {
            width: 60px;
            height: 60px;
            border-color: rgba(15, 242, 252, 0.5);
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }
            p {
                font-size: 1.2rem;
            }
            .container {
                padding: 2rem;
                margin: 1rem;
            }
        }
        
        /* Cyberpunk scanline effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(15, 15, 26, 0.1) 50%,
                rgba(15, 15, 26, 0.3) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.2;
            animation: scanline 8s linear infinite;
        }
        
        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }
        
        /* Floating tech elements */
        .floating-tech {
            position: absolute;
            opacity: 0.1;
            font-family: monospace;
            color: var(--neon);
            pointer-events: none;
            z-index: -1;
            animation: floatUp 15s linear infinite;
        }
        
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.1; }
            90% { opacity: 0.1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div id="particles-js"></div>
    <div class="scanlines"></div>
    
    <!-- Generate floating tech elements -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const techTerms = ['<div/>', 'AI', 'ML', 'blockchain', 'IoT', 'API', 'JSON', 'CSS3', 'HTML5', 'React', 'Vue', 'Angular', 'Node.js', 'Python', 'TensorFlow', 'Git', 'Docker', 'Kubernetes', 'AWS', 'Azure', 'BigData', 'VR', 'AR', 'blockchain', 'crypto', 'NFT', 'Web3', 'DevOps', 'CI/CD'];
            
            for (let i = 0; i < 30; i++) {
                const element = document.createElement('div');
                element.className = 'floating-tech';
                element.textContent = techTerms[Math.floor(Math.random() * techTerms.length)];
                element.style.left = `${Math.random() * 100}%`;
                element.style.fontSize = `${Math.random() * 1 + 0.5}rem`;
                element.style.animationDuration = `${Math.random() * 10 + 10}s`;
                element.style.animationDelay = `${Math.random() * 5}s`;
                document.body.appendChild(element);
            }
        });
    </script>
    
    <div class="container">
        <h1>TechLead</h1>
        <p><span class="tagline">Leading the frontier of technological innovation</span></p>
        
        <div class="tech-icons">
            <i class="fas fa-microchip tech-icon" style="animation-delay: 0.1s"></i>
            <i class="fas fa-robot tech-icon" style="animation-delay: 0.3s"></i>
            <i class="fas fa-code tech-icon" style="animation-delay: 0.5s"></i>
            <i class="fas fa-cloud tech-icon" style="animation-delay: 0.7s"></i>
            <i class="fas fa-database tech-icon" style="animation-delay: 0.9s"></i>
            <i class="fas fa-brain tech-icon" style="animation-delay: 1.1s"></i>
            <i class="fab fa-bitcoin tech-icon" style="animation-delay: 1.3s"></i>
            <i class="fas fa-shield-alt tech-icon" style="animation-delay: 1.5s"></i>
        </div>
    </div>
    
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Initialize particles.js
        particlesJS("particles-js", {
            "particles": {
                "number": {
                    "value": 80,
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": "#9d50bb"
                },
                "shape": {
                    "type": "circle",
                    "stroke": {
                        "width": 0,
                        "color": "#000000"
                    },
                    "polygon": {
                        "nb_sides": 5
                    }
                },
                "opacity": {
                    "value": 0.5,
                    "random": true,
                    "anim": {
                        "enable": true,
                        "speed": 1,
                        "opacity_min": 0.1,
                        "sync": false
                    }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": {
                        "enable": true,
                        "speed": 2,
                        "size_min": 0.1,
                        "sync": false
                    }
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#6e48aa",
                    "opacity": 0.4,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 1,
                    "direction": "none",
                    "random": true,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                    "attract": {
                        "enable": true,
                        "rotateX": 600,
                        "rotateY": 1200
                    }
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": true,
                        "mode": "grab"
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push"
                    },
                    "resize": true
                },
                "modes": {
                    "grab": {
                        "distance": 140,
                        "line_linked": {
                            "opacity": 1
                        }
                    },
                    "bubble": {
                        "distance": 400,
                        "size": 40,
                        "duration": 2,
                        "opacity": 8,
                        "speed": 3
                    },
                    "repulse": {
                        "distance": 200,
                        "duration": 0.4
                    },
                    "push": {
                        "particles_nb": 4
                    },
                    "remove": {
                        "particles_nb": 2
                    }
                }
            },
            "retina_detect": true
        });
        
        // Custom cursor effect
        const cursor = document.querySelector('.cursor');
        const cursorFollower = document.querySelector('.cursor-follower');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            setTimeout(() => {
                cursorFollower.style.left = e.clientX + 'px';
                cursorFollower.style.top = e.clientY + 'px';
            }, 100);
        });
        
        // Add hover effect to tech icons
        const techIcons = document.querySelectorAll('.tech-icon');
        techIcons.forEach(icon => {
            icon.addEventListener('mouseenter', () => {
                cursor.style.transform = 'translate(-50%, -50%) scale(2)';
                cursor.style.backgroundColor = 'rgba(15, 242, 252, 0.8)';
            });
            
            icon.addEventListener('mouseleave', () => {
                cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                cursor.style.backgroundColor = 'rgba(15, 242, 252, 0.5)';
            });
        });
    </script>
</body>
</html>
